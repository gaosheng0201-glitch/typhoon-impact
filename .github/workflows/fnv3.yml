# FNV3（Google DeepMind FGN）AI 台风路径历史复盘
# 只用 48 小时前的历史预报（CC BY 4.0），对官方实况算偏差。
# 数据变化慢（完成的台风是静态的，进行中的每天补齐验证即可），故 6 小时一次。
name: FNV3 hindcast

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hindcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute FNV3 hindcast
        run: python3 fetcher/fetch_fnv3.py || true
      - name: Build impact summary
        run: python3 fetcher/build_impact.py || true
      - name: Commit & push if changed
        run: |
          if ! git diff --quiet docs/data/fnv3 docs/data/impact.json; then
            git config user.name "typhoon-data-bot"
            git config user.email "actions@users.noreply.github.com"
            git add docs/data/fnv3 docs/data/impact.json
            git commit -m "data: FNV3 AI 复盘更新"
            git push
          fi
