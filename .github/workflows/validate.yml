# 数据校验：任何触碰对照库的提交/PR 必须先过机器把关
name: Validate data

on:
  pull_request:
    paths: ["docs/data/analogs*.json", "docs/data/checklists.json", "scripts/validate_analogs.py"]
  push:
    branches: [main]
    paths: ["docs/data/analogs*.json", "docs/data/checklists.json", "scripts/validate_analogs.py"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate analogs
        run: python3 scripts/validate_analogs.py
      - name: Validate checklists JSON syntax + banned words
        run: |
          python3 - << 'EOF'
          import json, re, sys
          d = json.load(open('docs/data/checklists.json'))
          bad = re.compile(r'(?<!无)(死亡|遇难|丧生|失踪|伤亡)|经济损失|亿元|万元')
          errs = []
          def scan(items, where):
              for it in items:
                  if bad.search(it): errs.append(f'{where}: {it[:40]}')
          for pid, lv in d['items'].items():
              for l, items in lv.items(): scan(items, f'items.{pid}.{l}')
          for ph, items in d['phases'].items():
              if isinstance(items, list): scan(items, f'phases.{ph}')
              else:
                  for pid, sub in items.items(): scan(sub, f'phases.{ph}.{pid}')
          if errs:
              print('\n'.join(errs)); sys.exit(1)
          print('checklists OK')
          EOF
